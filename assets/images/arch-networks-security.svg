<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#eff6ff"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/></filter>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1d4ed8"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#15803d"/></marker>
  </defs>

  <rect width="860" height="580" rx="14" fill="url(#bg)"/>
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Networks &amp; Security — From URL to Encrypted Response</text>
  <text x="430" y="52" text-anchor="middle" font-size="10.5" fill="#64748b">DNS · TCP Handshake · TLS · HTTP · Cryptography · Common Attacks</text>

  <!-- REQUEST JOURNEY -->
  <text x="30" y="78" font-size="10" font-weight="600" fill="#1d4ed8" letter-spacing="1.2">HTTPS REQUEST JOURNEY  (you type https://google.com)</text>

  <!-- Step boxes -->
  <rect x="30"  y="86" width="130" height="64" rx="8" fill="#fff" stroke="#1d4ed8" stroke-width="1.8" filter="url(#sh)"/>
  <text x="95" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">① DNS</text>
  <text x="95" y="123" text-anchor="middle" font-size="9" fill="#3b82f6">google.com</text>
  <text x="95" y="137" text-anchor="middle" font-size="9" fill="#93c5fd">→ 142.250.64.142</text>
  <text x="95" y="147" text-anchor="middle" font-size="8" fill="#bfdbfe">UDP port 53</text>

  <line x1="160" y1="118" x2="175" y2="118" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#aB)"/>

  <rect x="177" y="86" width="130" height="64" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.8" filter="url(#sh)"/>
  <text x="242" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">② TCP</text>
  <text x="242" y="123" text-anchor="middle" font-size="9" fill="#2563eb">SYN → SYN-ACK</text>
  <text x="242" y="137" text-anchor="middle" font-size="9" fill="#60a5fa">→ ACK</text>
  <text x="242" y="147" text-anchor="middle" font-size="8" fill="#93c5fd">reliable connection</text>

  <line x1="307" y1="118" x2="322" y2="118" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#aB)"/>

  <rect x="324" y="86" width="130" height="64" rx="8" fill="#dbeafe" stroke="#7c3aed" stroke-width="2.2" filter="url(#sh)"/>
  <text x="389" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">③ TLS</text>
  <text x="389" y="123" text-anchor="middle" font-size="9" fill="#7c3aed">key exchange (ECDH)</text>
  <text x="389" y="137" text-anchor="middle" font-size="9" fill="#8b5cf6">verify certificate</text>
  <text x="389" y="147" text-anchor="middle" font-size="8" fill="#a78bfa">AES-256-GCM</text>

  <line x1="454" y1="118" x2="469" y2="118" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#aB)"/>

  <rect x="471" y="86" width="130" height="64" rx="8" fill="#fff" stroke="#15803d" stroke-width="1.8" filter="url(#sh)"/>
  <text x="536" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">④ HTTP/2</text>
  <text x="536" y="123" text-anchor="middle" font-size="9" fill="#16a34a">GET /search?q=hi</text>
  <text x="536" y="137" text-anchor="middle" font-size="9" fill="#4ade80">multiplexed streams</text>
  <text x="536" y="147" text-anchor="middle" font-size="8" fill="#86efac">HPACK compression</text>

  <line x1="601" y1="118" x2="616" y2="118" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#aB)"/>

  <rect x="618" y="86" width="210" height="64" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="1.8" filter="url(#sh)"/>
  <text x="723" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">⑤ Server Response</text>
  <text x="723" y="123" text-anchor="middle" font-size="9" fill="#16a34a">200 OK + HTML/JSON</text>
  <text x="723" y="137" text-anchor="middle" font-size="9" fill="#4ade80">gzip compressed</text>
  <text x="723" y="147" text-anchor="middle" font-size="8" fill="#86efac">encrypted via TLS tunnel</text>

  <!-- TCP/IP LAYERS -->
  <text x="30" y="174" font-size="10" font-weight="600" fill="#0284c7" letter-spacing="1.2">TCP/IP LAYER STACK  (each layer wraps the one above)</text>

  <rect x="30"  y="182" width="590" height="30" rx="5" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="325" y="202" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1e3a5f">Application: HTTP/2 · DNS · SMTP · WebSocket</text>
  <rect x="30"  y="216" width="590" height="30" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="325" y="236" text-anchor="middle" font-size="10.5" font-weight="600" fill="#075985">Transport: TCP (reliable) · UDP (fast) · QUIC (both)</text>
  <rect x="30"  y="250" width="590" height="30" rx="5" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="325" y="270" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532d">Network: IP routing · BGP · ICMP · 15–20 hops globally</text>
  <rect x="30"  y="284" width="590" height="30" rx="5" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="325" y="304" text-anchor="middle" font-size="10.5" font-weight="600" fill="#78350f">Link: Ethernet (MAC) · Wi-Fi · ARP</text>
  <rect x="30"  y="318" width="590" height="30" rx="5" fill="#fff1f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="325" y="338" text-anchor="middle" font-size="10.5" font-weight="600" fill="#881337">Physical: Copper voltage · Fibre light · Radio waves (Wi-Fi/5G)</text>

  <!-- Packet encapsulation note -->
  <rect x="634" y="182" width="196" height="166" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.2" filter="url(#sh)"/>
  <text x="732" y="201" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Packet Layers</text>
  <rect x="644" y="208" width="176" height="17" rx="3" fill="#bfdbfe"/>
  <text x="732" y="220" text-anchor="middle" font-size="8.5" fill="#1e40af">Ethernet header (14B)</text>
  <rect x="650" y="228" width="164" height="17" rx="3" fill="#a7f3d0"/>
  <text x="732" y="240" text-anchor="middle" font-size="8.5" fill="#065f46">IP header (20B)</text>
  <rect x="656" y="248" width="152" height="17" rx="3" fill="#fde68a"/>
  <text x="732" y="260" text-anchor="middle" font-size="8.5" fill="#78350f">TCP header (20B)</text>
  <rect x="662" y="268" width="140" height="17" rx="3" fill="#ddd6fe"/>
  <text x="732" y="280" text-anchor="middle" font-size="8.5" fill="#4c1d95">TLS record (5B)</text>
  <rect x="668" y="288" width="128" height="17" rx="3" fill="#dcfce7"/>
  <text x="732" y="300" text-anchor="middle" font-size="8.5" fill="#14532d">HTTP/2 frame</text>
  <rect x="674" y="308" width="116" height="28" rx="3" fill="#1d4ed8"/>
  <text x="732" y="321" text-anchor="middle" font-size="8.5" fill="#fff">Your data</text>
  <text x="732" y="333" text-anchor="middle" font-size="8.5" fill="#bfdbfe">(your actual request)</text>

  <!-- CRYPTOGRAPHY + ATTACKS -->
  <text x="30" y="374" font-size="10" font-weight="600" fill="#7c3aed" letter-spacing="1.2">CRYPTOGRAPHY</text>
  <rect x="30" y="382" width="390" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="402" font-size="10" font-weight="600" fill="#5b21b6">Symmetric (AES-256)</text>
  <text x="50" y="418" font-size="9.5" fill="#7c3aed">same key encrypts + decrypts  · fast</text>
  <text x="50" y="434" font-size="9" fill="#94a3b8">used for bulk data after TLS handshake</text>
  <line x1="50" y1="442" x2="400" y2="442" stroke="#ede9fe" stroke-width="1"/>
  <text x="50" y="458" font-size="10" font-weight="600" fill="#5b21b6">Asymmetric (RSA / ECDSA)</text>
  <text x="50" y="474" font-size="9.5" fill="#7c3aed">public key encrypts · private key decrypts</text>
  <text x="50" y="488" font-size="9" fill="#94a3b8">used for TLS handshake · code signing · SSH</text>
  <text x="50" y="504" font-size="9" fill="#94a3b8">SHA-256 hash: one-way fingerprint · verify integrity</text>

  <text x="440" y="374" font-size="10" font-weight="600" fill="#b91c1c" letter-spacing="1.2">COMMON ATTACKS + DEFENCES</text>
  <rect x="440" y="382" width="390" height="140" rx="8" fill="#fff1f2" stroke="#b91c1c" stroke-width="1.5" filter="url(#sh)"/>
  <text x="460" y="402" font-size="10" font-weight="600" fill="#b91c1c">SQL Injection</text>
  <text x="460" y="418" font-size="9" fill="#7f1d1d">User input becomes SQL code → leak all data</text>
  <text x="460" y="430" font-size="9" fill="#16a34a">Fix: parameterized queries (cursor.execute(q, params))</text>
  <line x1="460" y1="440" x2="818" y2="440" stroke="#fecdd3" stroke-width="1"/>
  <text x="460" y="456" font-size="10" font-weight="600" fill="#b91c1c">XSS  (Cross-Site Scripting)</text>
  <text x="460" y="472" font-size="9" fill="#7f1d1d">Attacker injects &lt;script&gt; that runs in victim's browser</text>
  <text x="460" y="484" font-size="9" fill="#16a34a">Fix: escape all output  (&lt; → &amp;lt;, &gt; → &amp;gt;)</text>
  <line x1="460" y1="494" x2="818" y2="494" stroke="#fecdd3" stroke-width="1"/>
  <text x="460" y="508" font-size="9" fill="#7f1d1d">Phishing · MitM → Fix: HTTPS · check URLs · use 2FA</text>

  <text x="430" y="572" text-anchor="middle" font-size="8.5" fill="#94a3b8">diepdao.me  ·  CS Series Post 6  ·  Networks &amp; Security</text>
</svg>
