<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#fff7ed"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/></filter>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1d4ed8"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#15803d"/></marker>
  </defs>
  <rect width="860" height="520" rx="14" fill="url(#bg)"/>
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Databases — Storing and Querying Data at Scale</text>
  <text x="430" y="52" text-anchor="middle" font-size="10.5" fill="#64748b">Relational Model · ACID · B-Tree Indexes · MVCC · NoSQL Landscape</text>

  <!-- RELATIONAL TABLE -->
  <text x="30" y="78" font-size="10" font-weight="600" fill="#1d4ed8" letter-spacing="1.2">RELATIONAL MODEL  — tables, foreign keys, joins</text>
  <rect x="30" y="85" width="390" height="130" rx="8" fill="#fff" stroke="#1d4ed8" stroke-width="1.5" filter="url(#sh)"/>

  <!-- users table header -->
  <rect x="45" y="96" width="355" height="22" rx="3" fill="#1d4ed8"/>
  <text x="90"  y="112" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">id</text>
  <text x="160" y="112" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">name</text>
  <text x="270" y="112" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">email</text>
  <text x="375" y="112" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">created_at</text>

  <!-- rows -->
  <rect x="45" y="118" width="355" height="18" rx="2" fill="#eff6ff"/>
  <text x="90" y="131" text-anchor="middle" font-size="9" fill="#1d4ed8">1</text>
  <text x="160" y="131" text-anchor="middle" font-size="9" fill="#1e3a5f">Alice</text>
  <text x="270" y="131" text-anchor="middle" font-size="9" fill="#475569">alice@example.com</text>
  <text x="375" y="131" text-anchor="middle" font-size="9" fill="#475569">2025-01-15</text>

  <rect x="45" y="136" width="355" height="18" rx="2" fill="#fff"/>
  <text x="90" y="149" text-anchor="middle" font-size="9" fill="#1d4ed8">2</text>
  <text x="160" y="149" text-anchor="middle" font-size="9" fill="#1e3a5f">Bob</text>
  <text x="270" y="149" text-anchor="middle" font-size="9" fill="#475569">bob@example.com</text>
  <text x="375" y="149" text-anchor="middle" font-size="9" fill="#475569">2025-03-20</text>

  <!-- orders table -->
  <text x="50" y="178" font-size="9.5" fill="#1d4ed8" font-weight="600">orders table (user_id → foreign key to users)</text>
  <rect x="45" y="183" width="355" height="22" rx="3" fill="#0284c7"/>
  <text x="90" y="199" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">id</text>
  <text x="160" y="199" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">user_id</text>
  <text x="260" y="199" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">product</text>
  <text x="375" y="199" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">amount</text>
  <rect x="45" y="205" width="355" height="18" rx="2" fill="#e0f2fe"/>
  <text x="90" y="218" text-anchor="middle" font-size="9" fill="#075985">1</text>
  <text x="160" y="218" text-anchor="middle" font-size="9" fill="#dc2626">1</text>
  <text x="260" y="218" text-anchor="middle" font-size="9" fill="#1e3a5f">Laptop</text>
  <text x="375" y="218" text-anchor="middle" font-size="9" fill="#475569">$999.00</text>
  <text x="155" y="227" font-size="7.5" fill="#dc2626" text-anchor="middle">↑ → Alice</text>

  <!-- B-TREE INDEX -->
  <text x="440" y="78" font-size="10" font-weight="600" fill="#15803d" letter-spacing="1.2">B-TREE INDEX  — O(log n) lookup vs O(n) full scan</text>
  <rect x="440" y="85" width="390" height="130" rx="8" fill="#fff" stroke="#15803d" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Tree nodes -->
  <rect x="570" y="96" width="100" height="24" rx="4" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="620" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">M · · · · T</text>

  <rect x="470" y="140" width="90" height="22" rx="4" fill="#bbf7d0" stroke="#15803d" stroke-width="1.2"/>
  <text x="515" y="156" text-anchor="middle" font-size="9.5" fill="#166534">A · · · · G</text>
  <rect x="570" y="140" width="90" height="22" rx="4" fill="#bbf7d0" stroke="#15803d" stroke-width="1.2"/>
  <text x="615" y="156" text-anchor="middle" font-size="9.5" fill="#166534">H · · · · L</text>
  <rect x="670" y="140" width="90" height="22" rx="4" fill="#bbf7d0" stroke="#15803d" stroke-width="1.2"/>
  <text x="715" y="156" text-anchor="middle" font-size="9.5" fill="#166534">U · · · · Z</text>

  <!-- connecting lines -->
  <line x1="570" y1="120" x2="515" y2="139" stroke="#15803d" stroke-width="1.2"/>
  <line x1="620" y1="120" x2="615" y2="139" stroke="#15803d" stroke-width="1.2"/>
  <line x1="670" y1="120" x2="715" y2="139" stroke="#15803d" stroke-width="1.2"/>

  <!-- leaf nodes -->
  <rect x="450" y="178" width="56" height="20" rx="3" fill="#86efac" stroke="#15803d" stroke-width="1"/>
  <text x="478" y="192" text-anchor="middle" font-size="8.5" fill="#14532d">alice</text>
  <rect x="512" y="178" width="56" height="20" rx="3" fill="#86efac" stroke="#15803d" stroke-width="1"/>
  <text x="540" y="192" text-anchor="middle" font-size="8.5" fill="#14532d">bob</text>
  <rect x="574" y="178" width="56" height="20" rx="3" fill="#86efac" stroke="#15803d" stroke-width="1"/>
  <text x="602" y="192" text-anchor="middle" font-size="8.5" fill="#14532d">carol</text>

  <text x="620" y="145" font-size="9.5" fill="#15803d" text-anchor="middle">...</text>

  <text x="452" y="212" font-size="9" fill="#64748b">Without index: scan all rows = O(n)</text>
  <text x="452" y="226" font-size="9" fill="#15803d">With B-tree: 3 hops = O(log n)  ← 1000× faster!</text>

  <!-- ACID -->
  <text x="30" y="240" font-size="10" font-weight="600" fill="#7c3aed" letter-spacing="1.2">ACID TRANSACTIONS  — what makes a database safe</text>
  <rect x="30" y="248" width="185" height="90" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="122" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Atomicity</text>
  <text x="122" y="284" text-anchor="middle" font-size="9" fill="#5b21b6">all-or-nothing</text>
  <text x="122" y="298" text-anchor="middle" font-size="9" fill="#8b5cf6">no half-done state</text>
  <text x="122" y="312" text-anchor="middle" font-size="8.5" fill="#a78bfa">transfer: debit+credit</text>
  <text x="122" y="325" text-anchor="middle" font-size="8.5" fill="#a78bfa">both happen or neither</text>

  <rect x="225" y="248" width="185" height="90" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="317" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Consistency</text>
  <text x="317" y="284" text-anchor="middle" font-size="9" fill="#5b21b6">constraints hold</text>
  <text x="317" y="298" text-anchor="middle" font-size="9" fill="#8b5cf6">foreign keys valid</text>
  <text x="317" y="312" text-anchor="middle" font-size="8.5" fill="#a78bfa">can't insert order for</text>
  <text x="317" y="325" text-anchor="middle" font-size="8.5" fill="#a78bfa">non-existent user</text>

  <rect x="440" y="248" width="185" height="90" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="532" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Isolation</text>
  <text x="532" y="284" text-anchor="middle" font-size="9" fill="#5b21b6">concurrent txns</text>
  <text x="532" y="298" text-anchor="middle" font-size="9" fill="#8b5cf6">don't see each other's</text>
  <text x="532" y="312" text-anchor="middle" font-size="8.5" fill="#a78bfa">incomplete work</text>
  <text x="532" y="325" text-anchor="middle" font-size="8.5" fill="#a78bfa">MVCC snapshots</text>

  <rect x="635" y="248" width="195" height="90" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <text x="732" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Durability</text>
  <text x="732" y="284" text-anchor="middle" font-size="9" fill="#5b21b6">committed = permanent</text>
  <text x="732" y="298" text-anchor="middle" font-size="9" fill="#8b5cf6">survives power cuts</text>
  <text x="732" y="312" text-anchor="middle" font-size="8.5" fill="#a78bfa">write-ahead log (WAL)</text>
  <text x="732" y="325" text-anchor="middle" font-size="8.5" fill="#a78bfa">journal → replay on boot</text>

  <!-- NOSQL LANDSCAPE -->
  <text x="30" y="360" font-size="10" font-weight="600" fill="#b45309" letter-spacing="1.2">NoSQL LANDSCAPE  — different trade-offs for different problems</text>

  <rect x="30"  y="368" width="186" height="100" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" filter="url(#sh)"/>
  <text x="123" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Key-Value</text>
  <text x="123" y="404" text-anchor="middle" font-size="9.5" fill="#92400e">Redis · DynamoDB</text>
  <text x="123" y="419" text-anchor="middle" font-size="9" fill="#92400e">O(1) get/set</text>
  <text x="123" y="434" text-anchor="middle" font-size="9" fill="#94a3b8">Sessions · Caching</text>
  <text x="123" y="449" text-anchor="middle" font-size="9" fill="#94a3b8">Real-time leaderboards</text>
  <text x="123" y="462" text-anchor="middle" font-size="8.5" fill="#d97706">data lives in RAM</text>

  <rect x="226" y="368" width="186" height="100" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" filter="url(#sh)"/>
  <text x="319" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Document</text>
  <text x="319" y="404" text-anchor="middle" font-size="9.5" fill="#92400e">MongoDB · CouchDB</text>
  <text x="319" y="419" text-anchor="middle" font-size="9" fill="#92400e">flexible JSON schema</text>
  <text x="319" y="434" text-anchor="middle" font-size="9" fill="#94a3b8">User profiles · CMS</text>
  <text x="319" y="449" text-anchor="middle" font-size="9" fill="#94a3b8">Catalog with varying</text>
  <text x="319" y="462" text-anchor="middle" font-size="8.5" fill="#d97706">attributes per item</text>

  <rect x="422" y="368" width="186" height="100" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" filter="url(#sh)"/>
  <text x="515" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Column-Family</text>
  <text x="515" y="404" text-anchor="middle" font-size="9.5" fill="#92400e">Cassandra · HBase</text>
  <text x="515" y="419" text-anchor="middle" font-size="9" fill="#92400e">massive write scale</text>
  <text x="515" y="434" text-anchor="middle" font-size="9" fill="#94a3b8">Time-series · IoT</text>
  <text x="515" y="449" text-anchor="middle" font-size="9" fill="#94a3b8">Instagram · Netflix</text>
  <text x="515" y="462" text-anchor="middle" font-size="8.5" fill="#d97706">distributed by design</text>

  <rect x="618" y="368" width="212" height="100" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" filter="url(#sh)"/>
  <text x="724" y="388" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Graph DB</text>
  <text x="724" y="404" text-anchor="middle" font-size="9.5" fill="#92400e">Neo4j · Amazon Neptune</text>
  <text x="724" y="419" text-anchor="middle" font-size="9" fill="#92400e">first-class relationships</text>
  <text x="724" y="434" text-anchor="middle" font-size="9" fill="#94a3b8">Social networks</text>
  <text x="724" y="449" text-anchor="middle" font-size="9" fill="#94a3b8">Recommendation engines</text>
  <text x="724" y="462" text-anchor="middle" font-size="8.5" fill="#d97706">fraud detection</text>

  <!-- Rule of thumb -->
  <rect x="30" y="480" width="800" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="430" y="499" text-anchor="middle" font-size="10" fill="#475569">Start with PostgreSQL (relational).  Reach for NoSQL only when you hit a specific limit it solves better.  A missing index matters more than your choice of DB.</text>

  <text x="430" y="516" text-anchor="middle" font-size="8.5" fill="#94a3b8">diepdao.me  ·  CS Series Post 7  ·  Databases</text>
</svg>
