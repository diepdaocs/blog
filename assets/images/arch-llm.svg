<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ff"/>
      <stop offset="100%" style="stop-color:#faf5ff"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/></filter>
    <marker id="aI" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4f46e5"/></marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#15803d"/></marker>
  </defs>
  <rect width="860" height="520" rx="14" fill="url(#bg)"/>
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Large Language Models — How AI Understands &amp; Generates Text</text>
  <text x="430" y="52" text-anchor="middle" font-size="10.5" fill="#64748b">Tokenization · Embeddings · Transformer · Pretraining · RLHF · Inference</text>

  <!-- INFERENCE PIPELINE -->
  <text x="30" y="78" font-size="10" font-weight="600" fill="#4f46e5" letter-spacing="1.2">INFERENCE  — how a response is generated token by token</text>

  <!-- Step 1: Tokenize -->
  <rect x="30" y="86" width="110" height="68" rx="8" fill="#fff" stroke="#4f46e5" stroke-width="1.8" filter="url(#sh)"/>
  <text x="85" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">① Tokenize</text>
  <text x="85" y="123" text-anchor="middle" font-size="8.5" fill="#6366f1">"Hello world"</text>
  <text x="85" y="136" text-anchor="middle" font-size="8.5" fill="#818cf8">→ [15496, 995]</text>
  <text x="85" y="148" text-anchor="middle" font-size="8" fill="#a5b4fc">BPE algorithm</text>

  <line x1="140" y1="120" x2="154" y2="120" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#aI)"/>

  <!-- Step 2: Embed -->
  <rect x="156" y="86" width="110" height="68" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8" filter="url(#sh)"/>
  <text x="211" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">② Embed</text>
  <text x="211" y="123" text-anchor="middle" font-size="8.5" fill="#6366f1">IDs → vectors</text>
  <text x="211" y="136" text-anchor="middle" font-size="8.5" fill="#818cf8">12,288 dims</text>
  <text x="211" y="148" text-anchor="middle" font-size="8" fill="#a5b4fc">+ position info</text>

  <line x1="266" y1="120" x2="280" y2="120" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#aI)"/>

  <!-- Step 3: Transformer -->
  <rect x="282" y="86" width="160" height="68" rx="8" fill="#eef2ff" stroke="#7c3aed" stroke-width="2.2" filter="url(#sh)"/>
  <text x="362" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">③ Transformer</text>
  <text x="362" y="123" text-anchor="middle" font-size="8.5" fill="#6d28d9">96 layers of attention</text>
  <text x="362" y="136" text-anchor="middle" font-size="8.5" fill="#7c3aed">+ feed-forward</text>
  <text x="362" y="148" text-anchor="middle" font-size="8" fill="#8b5cf6">all tokens in parallel</text>

  <line x1="442" y1="120" x2="456" y2="120" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#aI)"/>

  <!-- Step 4: Probabilities -->
  <rect x="458" y="86" width="130" height="68" rx="8" fill="#fff" stroke="#4f46e5" stroke-width="1.8" filter="url(#sh)"/>
  <text x="523" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">④ Softmax</text>
  <text x="523" y="123" text-anchor="middle" font-size="8.5" fill="#6366f1">probability over</text>
  <text x="523" y="136" text-anchor="middle" font-size="8.5" fill="#818cf8">~100K vocab tokens</text>
  <text x="523" y="148" text-anchor="middle" font-size="8" fill="#a5b4fc">next: "world" p=0.82</text>

  <line x1="588" y1="120" x2="602" y2="120" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#aI)"/>

  <!-- Step 5: Sample -->
  <rect x="604" y="86" width="110" height="68" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8" filter="url(#sh)"/>
  <text x="659" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">⑤ Sample</text>
  <text x="659" y="123" text-anchor="middle" font-size="8.5" fill="#6366f1">pick a token</text>
  <text x="659" y="136" text-anchor="middle" font-size="8.5" fill="#818cf8">temperature ctrl</text>
  <text x="659" y="148" text-anchor="middle" font-size="8" fill="#a5b4fc">append → repeat</text>

  <line x1="714" y1="120" x2="728" y2="120" stroke="#15803d" stroke-width="1.8" marker-end="url(#aG)"/>

  <!-- Output -->
  <rect x="730" y="86" width="100" height="68" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.8" filter="url(#sh)"/>
  <text x="780" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Output</text>
  <text x="780" y="122" text-anchor="middle" font-size="8.5" fill="#166534">"Hello world</text>
  <text x="780" y="133" text-anchor="middle" font-size="8.5" fill="#166534">! How can</text>
  <text x="780" y="144" text-anchor="middle" font-size="8.5" fill="#166534">I help you?"</text>
  <text x="780" y="148" text-anchor="middle" font-size="8" fill="#86efac">one token/step</text>

  <!-- Repeat arrow -->
  <path d="M780,154 Q780,172 700,172 Q620,172 580,155" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#aI)"/>
  <text x="680" y="184" text-anchor="middle" font-size="8.5" fill="#94a3b8">repeat until end-of-sequence token</text>

  <!-- TRAINING PIPELINE -->
  <text x="30" y="210" font-size="10" font-weight="600" fill="#7c3aed" letter-spacing="1.2">TRAINING PIPELINE  — from raw text to helpful assistant</text>
  <rect x="30" y="218" width="800" height="130" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Phase 1 -->
  <rect x="45" y="232" width="230" height="100" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="160" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">① Pretraining</text>
  <text x="160" y="268" text-anchor="middle" font-size="9.5" fill="#6366f1">predict next token on</text>
  <text x="160" y="282" text-anchor="middle" font-size="9.5" fill="#6366f1">trillions of internet tokens</text>
  <text x="160" y="298" text-anchor="middle" font-size="9" fill="#818cf8">books · Wikipedia · GitHub</text>
  <text x="160" y="312" text-anchor="middle" font-size="9" fill="#818cf8">web pages · papers · code</text>
  <text x="160" y="325" text-anchor="middle" font-size="8.5" fill="#a5b4fc">months on 10,000 GPUs</text>

  <line x1="275" y1="282" x2="292" y2="282" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#aP)"/>

  <!-- Phase 2 -->
  <rect x="294" y="232" width="230" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="409" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">② Fine-tuning (SFT)</text>
  <text x="409" y="268" text-anchor="middle" font-size="9.5" fill="#6d28d9">train on human-written</text>
  <text x="409" y="282" text-anchor="middle" font-size="9.5" fill="#6d28d9">examples of ideal behavior</text>
  <text x="409" y="298" text-anchor="middle" font-size="9" fill="#8b5cf6">Q&amp;A · instructions · code</text>
  <text x="409" y="312" text-anchor="middle" font-size="9" fill="#8b5cf6">safety · helpfulness</text>
  <text x="409" y="325" text-anchor="middle" font-size="8.5" fill="#a78bfa">days on hundreds of GPUs</text>

  <line x1="524" y1="282" x2="541" y2="282" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#aP)"/>

  <!-- Phase 3 -->
  <rect x="543" y="232" width="272" height="100" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="679" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">③ RLHF</text>
  <text x="679" y="268" text-anchor="middle" font-size="9.5" fill="#166534">humans rank responses</text>
  <text x="679" y="282" text-anchor="middle" font-size="9.5" fill="#166534">→ train reward model</text>
  <text x="679" y="298" text-anchor="middle" font-size="9" fill="#4ade80">→ RL to maximize reward</text>
  <text x="679" y="312" text-anchor="middle" font-size="9" fill="#4ade80">model learns human preferences</text>
  <text x="679" y="325" text-anchor="middle" font-size="8.5" fill="#86efac">helpful · harmless · honest</text>

  <!-- TOKENIZATION + WHAT LLMs CAN/CANNOT DO -->
  <text x="30" y="372" font-size="10" font-weight="600" fill="#b45309" letter-spacing="1.2">TOKENIZATION  ·  CONTEXT WINDOW  ·  CAPABILITIES</text>

  <rect x="30" y="380" width="260" height="100" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Tokenization (BPE)</text>
  <text x="50" y="416" font-size="9" fill="#92400e">"Hello world!"  → [Hello][world][!]</text>
  <text x="50" y="430" font-size="9" fill="#92400e">"Unbelievable" → [Un][believ][able]</text>
  <text x="50" y="444" font-size="9" fill="#64748b">Vocabulary: ~50K–100K tokens</text>
  <text x="50" y="458" font-size="9" fill="#64748b">Context window (max tokens):</text>
  <text x="50" y="472" font-size="9" fill="#d97706">GPT-3: 4K  ·  GPT-4: 128K  ·  Claude: 200K</text>

  <rect x="300" y="380" width="245" height="100" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.5" filter="url(#sh)"/>
  <text x="422" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">LLMs are good at</text>
  <text x="318" y="416" font-size="9" fill="#166534">✓ Writing, editing, translating</text>
  <text x="318" y="431" font-size="9" fill="#166534">✓ Explaining complex topics</text>
  <text x="318" y="446" font-size="9" fill="#166534">✓ Writing and debugging code</text>
  <text x="318" y="461" font-size="9" fill="#166534">✓ In-context learning (few-shot)</text>
  <text x="318" y="476" font-size="9" fill="#166534">✓ Following complex instructions</text>

  <rect x="555" y="380" width="275" height="100" rx="8" fill="#fff1f2" stroke="#b91c1c" stroke-width="1.5" filter="url(#sh)"/>
  <text x="692" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">LLMs struggle with</text>
  <text x="573" y="416" font-size="9" fill="#7f1d1d">✗ Accurate arithmetic (use a calculator)</text>
  <text x="573" y="431" font-size="9" fill="#7f1d1d">✗ Factual accuracy — may hallucinate</text>
  <text x="573" y="446" font-size="9" fill="#7f1d1d">✗ Real-time info (training cutoff)</text>
  <text x="573" y="461" font-size="9" fill="#7f1d1d">✗ Multi-step logical proofs</text>
  <text x="573" y="476" font-size="9" fill="#7f1d1d">✗ Guaranteed correctness</text>

  <!-- Temperature note -->
  <rect x="30" y="490" width="800" height="22" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <text x="430" y="506" text-anchor="middle" font-size="9.5" fill="#475569">Temperature: 0 = deterministic (same answer always)  ·  0.7 = creative  ·  2.0 = very random.  Embeddings: similar meaning → similar vector (king − man + woman ≈ queen)</text>

  <text x="430" y="518" text-anchor="middle" font-size="8.5" fill="#94a3b8">diepdao.me  ·  CS Series Post 12  ·  Large Language Models</text>
</svg>
