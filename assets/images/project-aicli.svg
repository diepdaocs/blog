<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgCli" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20"/>
      <stop offset="100%" style="stop-color:#00695c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bgCli)"/>

  <!-- Terminal window chrome -->
  <rect x="70" y="50" width="260" height="148" rx="8" fill="rgba(0,0,0,0.45)"/>
  <rect x="70" y="50" width="260" height="22" rx="8" fill="rgba(0,0,0,0.6)"/>
  <!-- Traffic lights -->
  <circle cx="88" cy="61" r="5" fill="#ff5f57"/>
  <circle cx="104" cy="61" r="5" fill="#febc2e"/>
  <circle cx="120" cy="61" r="5" fill="#28c840"/>
  <!-- Window title -->
  <text x="200" y="65" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="9" font-family="monospace">aicli — terminal</text>

  <!-- CLI lines -->
  <text x="84" y="93" fill="#4ade80" font-size="10" font-family="monospace">$ aicli search kafka</text>
  <text x="84" y="110" fill="rgba(255,255,255,0.75)" font-size="9" font-family="monospace">  kafka · redis · clickhouse · pg…</text>
  <text x="84" y="128" fill="#4ade80" font-size="10" font-family="monospace">$ aicli get kafka/producer</text>
  <text x="84" y="145" fill="rgba(255,255,255,0.75)" font-size="9" font-family="monospace">  Fetching docs… cached ✓</text>
  <text x="84" y="163" fill="#93c5fd" font-size="9" font-family="monospace">  ## KafkaProducer</text>
  <text x="84" y="178" fill="#93c5fd" font-size="9" font-family="monospace">  send(topic, key, value) → …</text>

  <!-- Blinking cursor -->
  <rect x="84" y="187" width="6" height="11" fill="#4ade80" opacity="0.85"/>

  <!-- Tool badges floating top-right -->
  <rect x="290" y="30" width="54" height="18" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="317" y="43" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">Kafka</text>

  <rect x="334" y="110" width="54" height="18" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="361" y="123" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">Redis</text>

  <rect x="334" y="190" width="60" height="18" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="364" y="203" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">ClickHouse</text>

  <rect x="10" y="110" width="48" height="18" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="34" y="123" text-anchor="middle" fill="#fff" font-size="8" font-family="sans-serif">npm</text>

  <!-- Connecting dots -->
  <circle cx="344" cy="70" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="344" cy="80" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="344" cy="90" r="2" fill="rgba(255,255,255,0.4)"/>
</svg>
