remote_theme: mmistakes/minimal-mistakes
title: "Diep Dao"
description: "A blog about interesting things."

author:
  name: "Diep Dao"
  avatar: "/assets/images/profile.jpg"
  bio: "Software Engineer with 10+ years of experience in AI, ML, and full-stack development."
  location: "Singapore"
  email: "diepdaocs@gmail.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/diepdaocs"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/diepdaocs"
url: "https://diepdao.me"
permalink: /:categories/:year/:month/:day/:title/
copyright_url: "/about/"
baseurl: ""
repository: "diepdaocs/blog"

comments:
  provider: "giscus"
  giscus:
    repo:              "diepdaocs/blog"
    repo_id:           "R_kgDOOwHvKw"
    category:          "General"
    category_id:       "DIC_kwDOOwHvK84C3Y2Q"
    mapping:           "pathname"
    reactions_enabled: "1"
    emit_metadata:     "0"
    input_position:    "top"
    theme:             "preferred_color_scheme"
    lang:              "en"
    lazy:              true
collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: "_pages"
    values:
      layout: single
  - scope:
      path: ""
      type: "posts"
    values:
      comments: true

# Newsletter / mailing-list configuration (Mailchimp)
# ----------------------------------------------------
# 1. Log in at https://mailchimp.com
# 2. Go to Audience → Signup forms → Embedded forms
# 3. Click "Continue" — you'll see a form with an "action" URL in the HTML
#    It looks like: https://YOUR_SUBDOMAIN.us1.list-manage.com/subscribe/post?u=XXXXX&id=XXXXX
# 4. Copy that full action URL and paste it below, then rebuild the site.
newsletter:
  mailchimp_action: "https://diepdao.us11.list-manage.com/subscribe/post?u=a595d48084abe7160a3baa7ba&id=2d85377d2e"

after_footer_scripts:
  - /assets/js/theme-switch.js

plugins:
  - jekyll-include-cache
  - jekyll-feed
