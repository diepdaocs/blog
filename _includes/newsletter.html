<div class="newsletter-widget">
  <h3 class="newsletter-widget__title">Newsletter</h3>
  <p class="newsletter-widget__desc">New posts, straight to your inbox.</p>
  <form class="newsletter-widget__form" id="newsletter-sidebar-form" novalidate>
    <input
      type="email"
      name="EMAIL"
      class="newsletter-widget__input"
      placeholder="your@email.com"
      required
      aria-label="Email address"
    />
    <button type="submit" class="newsletter-widget__btn">Subscribe</button>
    <p class="newsletter-widget__status" id="newsletter-sidebar-status" aria-live="polite"></p>
  </form>
  <p class="newsletter-widget__unsub-link">
    <a href="/newsletter/#unsubscribe">Unsubscribe</a>
  </p>
</div>

<script>
(function () {
  var API_KEY  = '{{ site.newsletter.kit_api_key }}';
  var FORM_ID  = '{{ site.newsletter.kit_form_id }}';

  var form   = document.getElementById('newsletter-sidebar-form');
  var status = document.getElementById('newsletter-sidebar-status');
  if (!form) return;

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var email = (form.querySelector('input[name="EMAIL"]').value || '').trim();
    if (!email) return;

    if (!API_KEY || !FORM_ID) {
      showStatus('Newsletter is not configured yet.', 'error');
      return;
    }

    showStatus('Subscribing\u2026', '');
    kitSubscribe(API_KEY, FORM_ID, email, function (ok, msg) {
      if (ok) {
        showStatus('Subscribed! Check your inbox.', 'success');
        form.reset();
      } else {
        showStatus(msg || 'Something went wrong.', 'error');
      }
    });
  });

  function showStatus(msg, type) {
    status.textContent = msg;
    status.className   = 'newsletter-widget__status' + (type ? ' newsletter-widget__status--' + type : '');
  }
})();

function kitSubscribe(apiKey, formId, email, cb) {
  fetch('https://api.convertkit.com/v3/forms/' + formId + '/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ api_key: apiKey, email: email })
  })
  .then(function (r) { return r.json(); })
  .then(function (data) {
    if (data && data.subscription) { cb(true); }
    else { cb(false, (data && data.message) ? data.message : null); }
  })
  .catch(function () { cb(false, 'Network error. Please try again.'); });
}
</script>
